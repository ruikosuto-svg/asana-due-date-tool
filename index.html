<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asana 期日一括設定ツール | officedeyasai</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif;
      background: #f4f5f7;
      min-height: 100vh;
      padding: 32px 16px;
      color: #172b4d;
    }
    .container { max-width: 600px; margin: 0 auto; }
    .header { margin-bottom: 24px; }
    .header h1 { font-size: 22px; font-weight: 700; color: #172b4d; }
    .header p { font-size: 13px; color: #6b778c; margin-top: 4px; }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 1px 4px rgba(9,30,66,.12);
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 12px;
      font-weight: 700;
      color: #6b778c;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 16px;
    }

    .field { margin-bottom: 18px; }
    .field:last-child { margin-bottom: 0; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #172b4d;
      margin-bottom: 6px;
    }
    .field input, .field select {
      width: 100%;
      height: 40px;
      padding: 0 12px;
      border: 2px solid #dfe1e6;
      border-radius: 6px;
      font-size: 14px;
      color: #172b4d;
      background: #fafbfc;
      outline: none;
      transition: border-color .15s, background .15s;
    }
    .field input:focus, .field select:focus {
      border-color: #4c9aff;
      background: #fff;
    }
    .field .hint {
      font-size: 11px;
      color: #6b778c;
      margin-top: 5px;
    }

    .pat-row { display: flex; gap: 8px; align-items: flex-start; }
    .pat-row input { flex: 1; }
    .btn-test {
      height: 40px;
      padding: 0 14px;
      background: #f4f5f7;
      border: 2px solid #dfe1e6;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      color: #42526e;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s;
    }
    .btn-test:hover { background: #ebecf0; }
    .pat-status { font-size: 12px; margin-top: 5px; min-height: 16px; }
    .pat-status.ok { color: #00875a; }
    .pat-status.err { color: #de350b; }

    .pkg-group { display: flex; gap: 8px; }
    .pkg-option { flex: 1; }
    .pkg-option input[type="radio"] { display: none; }
    .pkg-option label {
      display: block;
      padding: 10px;
      border: 2px solid #dfe1e6;
      border-radius: 6px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: #42526e;
      cursor: pointer;
      transition: all .15s;
    }
    .pkg-option input:checked + label {
      border-color: #4c9aff;
      background: #e9f2ff;
      color: #0052cc;
    }

    .btn-run {
      width: 100%;
      height: 48px;
      background: #0052cc;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
      letter-spacing: .02em;
    }
    .btn-run:hover { background: #0065ff; }
    .btn-run:disabled { background: #b3d4ff; cursor: not-allowed; }

    /* Results */
    #result-section { display: none; }
    .summary-bar {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .summary-bar.ok { background: #e3fcef; color: #006644; }
    .summary-bar.err { background: #ffebe6; color: #bf2600; }

    .result-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .result-table th {
      padding: 8px 12px;
      text-align: left;
      background: #f4f5f7;
      color: #6b778c;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      border-bottom: 2px solid #dfe1e6;
    }
    .result-table td {
      padding: 9px 12px;
      border-bottom: 1px solid #f4f5f7;
      vertical-align: middle;
    }
    .result-table tr:last-child td { border-bottom: none; }
    .result-table tr:hover td { background: #f8f9fa; }

    .due { font-weight: 700; color: #172b4d; font-variant-numeric: tabular-nums; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
    }
    .badge-ok { background: #e3fcef; color: #006644; }
    .badge-skip { background: #f4f5f7; color: #6b778c; }
    .badge-err { background: #ffebe6; color: #bf2600; }

    .error-box {
      padding: 12px 16px;
      background: #ffebe6;
      border-radius: 8px;
      font-size: 13px;
      color: #bf2600;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Asana 期日一括設定ツール</h1>
    <p>発売月をもとに、商品タスクの全サブタスクへ期日を自動設定します</p>
  </div>

  <!-- 認証カード -->
  <div class="card">
    <div class="card-title">Asana 認証</div>
    <div class="field">
      <label>Personal Access Token</label>
      <div class="pat-row">
        <input type="password" id="pat" placeholder="2/xxxxxxxxxxxxxxxx">
        <button class="btn-test" onclick="testPat()">接続テスト</button>
      </div>
      <div class="pat-status" id="pat-status"></div>
      <div class="hint">Asana › 設定 › アプリ › デベロッパーコンソール › 個人アクセストークン で発行。一度入力すれば保存されます。</div>
    </div>
  </div>

  <!-- 設定カード -->
  <div class="card">
    <div class="card-title">設定</div>

    <div class="field">
      <label>Asana タスク URL または GID</label>
      <input type="text" id="task-url" placeholder="https://app.asana.com/... または 1215707667924409">
      <div class="hint">AsanaでタスクのURLをコピーしてそのまま貼り付けてください</div>
    </div>

    <div class="field">
      <label>発売年月</label>
      <input type="month" id="launch-month">
    </div>

    <div class="field">
      <label>包材タイプ</label>
      <div class="pkg-group">
        <div class="pkg-option">
          <input type="radio" name="pkg" id="pkg-insatsu" value="印刷袋" checked>
          <label for="pkg-insatsu">印刷袋</label>
        </div>
        <div class="pkg-option">
          <input type="radio" name="pkg" id="pkg-label" value="ラベル">
          <label for="pkg-label">ラベル</label>
        </div>
      </div>
    </div>

    <button class="btn-run" id="run-btn" onclick="run()">期日を一括設定する</button>
  </div>

  <!-- 結果 -->
  <div id="result-section">
    <div id="summary-bar" class="summary-bar"></div>
    <div class="card" style="padding: 0; overflow: hidden;">
      <table class="result-table">
        <thead>
          <tr>
            <th>タスク名</th>
            <th>期日</th>
            <th>結果</th>
          </tr>
        </thead>
        <tbody id="result-body"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
// ─── 期日ルール（早見表 v14 チルド・グロサリーチーム） ───
// [months_offset, day_rule]
// months_offset: 発売月からの月数（-2=2ヶ月前、0=発売月）
// day_rule: 'last'=末日 / 'week2'=第2週月曜 / 'biz5'=5営業日 / 数字=その日
const RULES = [
  { key: 'OEM依頼先',          印刷袋: [-6,'last'], ラベル: [-6,'last'] },
  { key: '売買契約',            印刷袋: [-2,'last'], ラベル: [-2,'last'] },
  { key: '仕入先台帳',          印刷袋: [-2,'last'], ラベル: [-2,'last'] },
  { key: '営業許可証',          印刷袋: [-6,'last'], ラベル: [-6,'last'] },
  { key: '認証取得状況',        印刷袋: [-6,'last'], ラベル: [-6,'last'] },
  { key: '事前工場監査',        印刷袋: [-6,'last'], ラベル: [-6,'last'] },
  { key: '工場監査',            印刷袋: [-1,'last'], ラベル: [-1,'last'] },
  { key: 'Bill One',            印刷袋: [-1,'last'], ラベル: [-1,'last'] },
  { key: 'サンプル手配',        印刷袋: [-6,'last'], ラベル: [-6,'last'] },
  { key: '見積書取得',          印刷袋: [-6,'last'], ラベル: [-6,'last'] },
  { key: '発注方法確認',        印刷袋: [-6,'last'], ラベル: [-5,'last'] },
  { key: '商品規格情報',        印刷袋: [-6,'last'], ラベル: [-4,'last'] },
  { key: '規格書取得',          印刷袋: [-2,15],     ラベル: [-2,15]    },
  { key: '規格書確認',          印刷袋: [-2,15],     ラベル: [-2,15]    },
  { key: 'ポジティブリスト',    印刷袋: [-6,'last'], ラベル: [-5,'last'] },
  { key: '裏面ラベル',          印刷袋: [-2,'last'], ラベル: [-2,'last'] },
  { key: '一括表示記載内容',    印刷袋: [-6,'last'], ラベル: [-2,15]    },
  { key: '包材資材',            印刷袋: [-6,'last'], ラベル: [-5,'last'] },
  { key: '包材業者',            印刷袋: [-6,'last'], ラベル: [-5,'last'] },
  { key: '写真撮影',            印刷袋: [-5,'last'], ラベル: [-4,'last'] },
  { key: 'デザイン入稿',        印刷袋: [-5,'last'], ラベル: [-3,'last'] },
  { key: '入稿',                印刷袋: [-5,'last'], ラベル: [-3,'last'] },
  { key: 'デザイン',            印刷袋: [-5,'last'], ラベル: [-4,'last'] },
  { key: '包装資材納品',        印刷袋: [-2,20],     ラベル: [-2,20]    },
  { key: 'CMSマスタ登録',       印刷袋: [-2,'last'], ラベル: [-2,'last'] },
  { key: 'マスタ登録',          印刷袋: [-2,'last'], ラベル: [-2,'last'] },
  { key: '最終卸値',            印刷袋: [-2,'last'], ラベル: [-2,'last'] },
  { key: 'リクエスト原稿',      印刷袋: [-2,'last'], ラベル: [-2,'last'] },
  { key: '新商品情報シート',    印刷袋: [-1,1],      ラベル: [-1,1]     },
  { key: 'リクエスト画面FIX',   印刷袋: [-1,4],      ラベル: [-1,4]     },
  { key: 'メニュー表作成',      印刷袋: [-1,5],      ラベル: [-1,5]     },
  { key: '形態確認',            印刷袋: [-2,'week2'],ラベル: [-2,'week2']},
  { key: 'ラインナップ確定案内',印刷袋: [-1,5],      ラベル: [-1,5]     },
  { key: '運営（PM）',          印刷袋: [-1,5],      ラベル: [-1,5]     },
  { key: '運営-発注',           印刷袋: [-1,5],      ラベル: [-1,5]     },
  { key: '運営チーム',          印刷袋: [-1,5],      ラベル: [-1,5]     },
  { key: '製造依頼',            印刷袋: [-2,15],     ラベル: [-2,15]    },
  { key: '初回製造品確認',      印刷袋: [0,'biz5'],  ラベル: [0,'biz5'] },
  { key: '販促',                印刷袋: [-1,'last'], ラベル: [-1,'last'] },
];

function findRule(name) {
  return RULES.find(r => name.includes(r.key)) || null;
}

function lastDay(y, m) { return new Date(y, m, 0).getDate(); }

function calcDue(launchYear, launchMonth0, offset, dayRule) {
  let total = launchMonth0 + offset;
  let y = launchYear + Math.floor(total / 12);
  let m0 = ((total % 12) + 12) % 12; // 0-indexed
  const m1 = m0 + 1; // 1-indexed
  let d;
  if (dayRule === 'last') {
    d = lastDay(y, m1);
  } else if (dayRule === 'week2') {
    const wd = new Date(y, m0, 1).getDay(); // 0=Sun
    const firstMon = wd === 1 ? 1 : 1 + (8 - wd) % 7;
    d = Math.min(firstMon + 7, lastDay(y, m1));
  } else if (dayRule === 'biz5') {
    let cnt = 0, day = 1, max = lastDay(y, m1);
    while (day <= max) {
      const wd = new Date(y, m0, day).getDay();
      if (wd !== 0 && wd !== 6) { cnt++; if (cnt === 5) break; }
      day++;
    }
    d = day;
  } else {
    d = Math.min(dayRule, lastDay(y, m1));
  }
  return `${y}-${String(m1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function extractGid(input) {
  input = (input || '').trim();
  // /task/GID形式
  let m = input.match(/\/task\/(\d+)/);
  if (m) return m[1];
  // 末尾の数字
  m = input.match(/[/?]?(\d{10,})/);
  if (m) return m[1];
  // 数字のみ
  if (/^\d+$/.test(input)) return input;
  return null;
}

const API = 'https://app.asana.com/api/1.0';
function headers(pat) {
  return { 'Authorization': `Bearer ${pat}`, 'Content-Type': 'application/json' };
}

// ─── PAT 保存 ───
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('asana_pat');
  if (saved) document.getElementById('pat').value = saved;
});
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('pat').addEventListener('change', e => {
    if (e.target.value.trim()) localStorage.setItem('asana_pat', e.target.value.trim());
  });
});

// ─── 接続テスト ───
async function testPat() {
  const pat = document.getElementById('pat').value.trim();
  const el = document.getElementById('pat-status');
  if (!pat) { el.className = 'pat-status err'; el.textContent = 'PATを入力してください'; return; }
  el.className = 'pat-status'; el.textContent = '確認中…';
  try {
    const r = await fetch(`${API}/users/me`, { headers: headers(pat) });
    const d = await r.json();
    if (r.ok) {
      localStorage.setItem('asana_pat', pat);
      el.className = 'pat-status ok';
      el.textContent = `✅ 接続OK（${d.data.name}）`;
    } else {
      el.className = 'pat-status err';
      el.textContent = `❌ ${d.errors?.[0]?.message || r.status}`;
    }
  } catch(e) {
    el.className = 'pat-status err';
    el.textContent = `❌ 通信エラー: ${e.message}`;
  }
}

// ─── 期日一括設定 ───
async function run() {
  const pat = document.getElementById('pat').value.trim();
  const urlInput = document.getElementById('task-url').value;
  const launchVal = document.getElementById('launch-month').value;
  const pkg = document.querySelector('input[name="pkg"]:checked').value;

  const gid = extractGid(urlInput);
  if (!pat || !gid || !launchVal) {
    alert('PAT・タスクURL（またはGID）・発売年月をすべて入力してください。');
    return;
  }

  const [ys, ms] = launchVal.split('-');
  const launchYear = parseInt(ys), launchMonth0 = parseInt(ms) - 1;

  const btn = document.getElementById('run-btn');
  btn.disabled = true; btn.textContent = '設定中…';
  document.getElementById('result-section').style.display = 'none';
  document.getElementById('result-body').innerHTML = '';
  document.getElementById('summary-bar').innerHTML = '';

  try {
    const r = await fetch(`${API}/tasks/${gid}/subtasks?opt_fields=gid,name`, { headers: headers(pat) });
    if (!r.ok) {
      const d = await r.json();
      showError(`サブタスク取得失敗 (${r.status}): ${d.errors?.[0]?.message || ''}`);
      return;
    }
    const { data: subtasks } = await r.json();

    let okCount = 0, skipCount = 0, errCount = 0;
    const tbody = document.getElementById('result-body');

    for (const task of subtasks) {
      const rule = findRule(task.name);
      const tr = document.createElement('tr');

      if (!rule) {
        skipCount++;
        tr.innerHTML = `<td>${task.name}</td><td>—</td><td><span class="badge badge-skip">スキップ</span></td>`;
        tbody.appendChild(tr);
        continue;
      }

      const [offset, dayRule] = rule[pkg];
      const due = calcDue(launchYear, launchMonth0, offset, dayRule);

      try {
        const ur = await fetch(`${API}/tasks/${task.gid}`, {
          method: 'PUT',
          headers: headers(pat),
          body: JSON.stringify({ data: { due_on: due } })
        });
        if (ur.ok) {
          okCount++;
          tr.innerHTML = `<td>${task.name}</td><td class="due">${due}</td><td><span class="badge badge-ok">✓ 設定完了</span></td>`;
        } else {
          errCount++;
          tr.innerHTML = `<td>${task.name}</td><td class="due">${due}</td><td><span class="badge badge-err">エラー</span></td>`;
        }
      } catch {
        errCount++;
        tr.innerHTML = `<td>${task.name}</td><td>—</td><td><span class="badge badge-err">エラー</span></td>`;
      }
      tbody.appendChild(tr);
    }

    const bar = document.getElementById('summary-bar');
    bar.className = `summary-bar ${errCount > 0 ? 'err' : 'ok'}`;
    bar.textContent = `完了: ${okCount}件設定 ／ スキップ: ${skipCount}件 ／ エラー: ${errCount}件`;
    document.getElementById('result-section').style.display = 'block';

  } catch(e) {
    showError(e.message);
  } finally {
    btn.disabled = false; btn.textContent = '期日を一括設定する';
  }
}

function showError(msg) {
  const sec = document.getElementById('result-section');
  document.getElementById('summary-bar').innerHTML = `<div class="error-box">❌ ${msg}</div>`;
  document.getElementById('summary-bar').className = '';
  sec.style.display = 'block';
}
</script>
</body>
</html>
